name: 🔨 Build EtherX Browser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v2.4.35)"
        required: false
        default: ""

jobs:
  # ─── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (AppImage + .deb)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🛠️ System dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential python3 python3-pip python3-setuptools \
            fakeroot dpkg-dev rpm libsecret-1-dev

      - name: 📦 Install npm packages
        run: npm ci
        env:
          npm_config_build_from_source: true
          CXXFLAGS: -std=c++20

      - name: 🔨 Build Linux
        run: npx electron-builder --linux --publish never

      - name: 📤 Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          retention-days: 7
          path: |
            dist/*.AppImage
            dist/*.deb

  # ─── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (Portable + ZIP)
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🛠️ Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install npm packages
        run: npm ci
        env:
          npm_config_msvs_version: 2022
          CXXFLAGS: /std:c++20

      - name: 🔨 Build Windows
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 📤 Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          retention-days: 7
          path: |
            dist/*.exe
            dist/*.zip

  # ─── macOS x64 ────────────────────────────────────────────────────────────────
  build-macos-x64:
    name: 🍎 macOS x64
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🛠️ Python setuptools
        run: brew install python-setuptools || true

      - name: 📦 Install npm (no postinstall)
        run: npm ci --ignore-scripts
        env:
          CXXFLAGS: -std=c++20

      - name: 🔧 Rebuild native modules x64
        run: npx electron-rebuild --arch x64 -f -w better-sqlite3
        env:
          CXXFLAGS: -std=c++20

      - name: 🔨 Build macOS x64
        run: npx electron-builder --mac dmg zip --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 📤 Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-builds
          retention-days: 7
          path: |
            dist/*.dmg
            dist/*.zip

  # ─── macOS arm64 ──────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: 🍎 macOS arm64
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🛠️ Python setuptools
        run: brew install python-setuptools || true

      - name: 📦 Install npm (no postinstall)
        run: npm ci --ignore-scripts
        env:
          CXXFLAGS: -std=c++20

      - name: 🔧 Rebuild native modules arm64
        run: npx electron-rebuild --arch arm64 -f -w better-sqlite3
        env:
          CXXFLAGS: -std=c++20

      - name: 🔨 Build macOS arm64
        run: npx electron-builder --mac dmg zip --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 📤 Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-builds
          retention-days: 7
          path: |
            dist/*.dmg
            dist/*.zip

  # ─── Gitea Release ────────────────────────────────────────────────────────────
  release:
    name: 🚀 Publish Gitea Release
    needs: [build-linux, build-windows, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: |
      always() && !cancelled() &&
      (needs.build-linux.result == 'success' || needs.build-windows.result == 'success' ||
       needs.build-macos-x64.result == 'success' || needs.build-macos-arm64.result == 'success')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 📋 List artifacts
        run: find artifacts -type f | sort

      - name: 🏷️ Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Create Gitea Release
        uses: https://gitea.com/actions/gitea-release-action@latest
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "EtherX Browser ${{ steps.tag.outputs.tag }}"
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.exe
            artifacts/*.zip
            artifacts/*.dmg
          body: |
            ## 🚀 EtherX Browser ${{ steps.tag.outputs.tag }}

            ### 📥 Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | 🐧 **Linux** | `.AppImage` | Portable, radi na svakom distroju |
            | 🐧 **Linux** | `.deb` | Ubuntu / Debian |
            | 🪟 **Windows** | `.exe` | Portable, bez instalacije |
            | 🪟 **Windows** | `.zip` | ZIP arhiva |
            | 🍎 **macOS** | `.dmg` | Disk image |

            ---
            © 2024–2026 kriptoentuzijasti.io
