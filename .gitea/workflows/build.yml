name: 🔨 Build EtherX Browser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v2.4.18)"
        required: false
        default: ""
      create_release:
        description: "Create Release after build?"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: 🐧 Linux (AppImage + .deb)
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🛠️ Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            python3-setuptools \
            fakeroot \
            dpkg-dev \
            rpm \
            libsecret-1-dev

      - name: 📦 Install npm packages
        run: npm ci
        env:
          npm_config_build_from_source: true
          CXXFLAGS: -std=c++20

      - name: 🔨 Build Linux packages
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: 📤 Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          retention-days: 30
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    name: 🚀 Publish Release
    needs: [build-linux]
    runs-on: self-hosted
    if: |
      always() &&
      !cancelled() &&
      needs.build-linux.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' && github.event.inputs.version != ''))

    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 📋 List artifacts
        run: find artifacts -type f | sort

      - name: 🏷️ Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Create Release
        uses: https://gitea.com/actions/gitea-release-action@main
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "EtherX Browser ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
          body: |
            ## 🚀 EtherX Browser ${{ steps.tag.outputs.tag }}

            ### 📥 Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | 🐧 **Linux** | `.AppImage` | Portable, runs on any distro |
            | 🐧 **Linux** | `.deb` | Ubuntu / Debian installer |

            **Linux AppImage:**
            ```bash
            chmod +x "EtherX Browser-*.AppImage"
            ./"EtherX Browser-*.AppImage" --no-sandbox
            ```

            **Linux .deb:**
            ```bash
            sudo dpkg -i etherx-browser_*.deb
            ```

